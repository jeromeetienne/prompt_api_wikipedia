<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>On-Device Wikipedia Chat</title>
    <!-- Theme detection: Apply dark/light theme based on system preference -->
    <script>
        (function () {
            var mq = window.matchMedia('(prefers-color-scheme: dark)');
            var apply = function () {
                document.documentElement.setAttribute('data-bs-theme', mq.matches ? 'dark' : 'light');
            };
            apply();
            mq.addEventListener('change', apply);
        })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <!-- boostrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body {
            min-height: 100dvh;
        }

        .markdown-bubble> :first-child {
            margin-top: 0;
        }

        .markdown-bubble> :last-child {
            margin-bottom: 0;
        }

        .markdown-bubble pre {
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            background-color: var(--bs-body-bg);
            border-radius: 0.375rem;
            overflow-x: auto;
        }

        .markdown-bubble code {
            font-size: 0.875em;
        }

        .markdown-bubble :not(pre)>code {
            padding: 0.125rem 0.25rem;
            background-color: var(--bs-body-bg);
            border-radius: 0.25rem;
        }
    </style>
  <script type="module" crossorigin src="../assets/chat-6QCrmORy.js"></script>
</head>

<body class="d-flex flex-column bg-body">
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom sticky-top" style="min-height: 57px;">
        <div class="container d-flex justify-content-between align-items-center" style="max-width: 780px;">
            <a class="navbar-brand fw-semibold mb-0 fs-5" href="../">On-Device Wikipedia Chat</a>
            <div class="d-flex gap-2">
                <a id="github" class="btn btn-outline-secondary btn-sm"
                    href="https://github.com/jeromeetienne/ondevice_wikipedia_chat" target="_blank" rel="noreferrer"
                    title="View source on GitHub">
                    <i class="bi bi-github"></i>
                    <span class="d-none d-sm-inline ms-1">GitHub</span>
                </a>
                <button id="new-chat" type="button" class="btn btn-outline-secondary btn-sm" title="Start a new chat">
                    <i class="bi bi-plus-lg"></i>
                    <span class="d-none d-sm-inline ms-1">New chat</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="container d-flex flex-column flex-grow-1" style="max-width: 780px;">
        <main id="messages" class="flex-grow-1 d-flex flex-column gap-3 py-3" aria-live="polite"></main>

        <div class="bg-body sticky-bottom">
            <form id="form" class="pt-2 pb-2">
                <div class="input-group input-group-lg shadow-sm">
                    <input id="input" class="form-control" type="text"
                        placeholder="Ask a question about anything on Wikipedia…" autocomplete="off" required />
                    <button id="mic" type="button" class="btn btn-outline-secondary" title="Speak your question"
                        hidden>
                        <i class="bi bi-mic-fill"></i>
                    </button>
                    <button id="submit" class="btn btn-primary" type="submit">Ask</button>
                </div>
            </form>
            <div class="d-flex align-items-center pb-3">
                <div id="banner" class="small text-warning" role="status" hidden></div>
                <!-- *************************************************************************** -->
                <!-- 	Made with love by Jerome Etienne					 -->
                <!-- *************************************************************************** -->
                <small class="ms-auto">
                    Made with
                    <i class="bi bi-heart-fill text-danger"></i>
                    by
                    <a href="https://www.linkedin.com/in/jeromeetienne/" target="_blank">
                        Jerome Etienne
                    </a>
                </small>
            </div>
        </div>
    </div>

</body>

</html>
