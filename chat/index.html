<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>On-Device Wikipedia Chat</title>
    <!-- Theme detection: Apply dark/light theme based on system preference -->
    <script>
        (function () {
            var mq = window.matchMedia('(prefers-color-scheme: dark)');
            var apply = function () {
                document.documentElement.setAttribute('data-bs-theme', mq.matches ? 'dark' : 'light');
            };
            apply();
            mq.addEventListener('change', apply);
        })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />

    <!-- boostrap icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        body {
            height: 100dvh;
        }

        .markdown-bubble> :first-child {
            margin-top: 0;
        }

        .markdown-bubble> :last-child {
            margin-bottom: 0;
        }

        .markdown-bubble pre {
            margin-bottom: 0.5rem;
            padding: 0.5rem;
            background-color: var(--bs-body-bg);
            border-radius: 0.375rem;
            overflow-x: auto;
        }

        .markdown-bubble code {
            font-size: 0.875em;
        }

        .markdown-bubble :not(pre)>code {
            padding: 0.125rem 0.25rem;
            background-color: var(--bs-body-bg);
            border-radius: 0.25rem;
        }
    </style>
  <script type="module" crossorigin src="../assets/chat-B5WJ_q5e.js"></script>
</head>

<body class="d-flex flex-column bg-body">
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom" style="min-height: 57px;">
        <div class="container d-flex justify-content-between align-items-center" style="max-width: 780px;">
            <a class="navbar-brand fw-semibold mb-0 fs-5" href="../">On-Device Wikipedia Chat</a>
            <button id="new-chat" type="button" class="btn btn-outline-secondary btn-sm" title="Start a new chat">
                <i class="bi bi-plus-lg"></i>
                <span class="d-none d-sm-inline ms-1">New chat</span>
            </button>
        </div>
    </nav>

    <div class="container d-flex flex-column flex-grow-1 overflow-hidden" style="max-width: 780px;">
        <div id="banner" class="alert alert-warning small mt-3 mb-0" role="alert" hidden></div>

        <main id="messages" class="flex-grow-1 overflow-auto d-flex flex-column gap-3 py-3" aria-live="polite"></main>

        <form id="form" class="pt-2 pb-2 bg-body sticky-bottom">
            <div class="input-group input-group-lg shadow-sm">
                <input id="input" class="form-control" type="text"
                    placeholder="Ask a question about anything on Wikipedia…" autocomplete="off" required />
                <button id="mic" type="button" class="btn btn-outline-secondary" title="Speak your question" hidden>
                    <i class="bi bi-mic-fill"></i>
                </button>
                <button id="submit" class="btn btn-primary" type="submit">Ask</button>
            </div>
        </form>

        <!-- *************************************************************************** -->
        <!-- 	Made with love by Jerome Etienne					 -->
        <!-- *************************************************************************** -->
        <div class="text-end pb-3">
            <small>
                Made with
                <i class="bi bi-heart-fill text-danger"></i>
                by
                <a href="https://www.linkedin.com/in/jeromeetienne/" target="_blank">
                    Jerome Etienne
                </a>
            </small>
        </div>
    </div>

</body>

</html>
