<!doctype html>
<html lang="en" data-bs-theme="dark">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Talk with Wikipedia</title>
		<link
			rel="stylesheet"
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
		<script type="module" crossorigin src="/prompt_api_wikipedia/assets/index-B6_rGpU3.js"></script>
		<link rel="stylesheet" crossorigin href="/prompt_api_wikipedia/assets/index-7dN0zzDD.css">
	</head>
	<body class="d-flex flex-column vh-100">
		<div class="container py-3 d-flex flex-column flex-grow-1" style="max-width: 780px;">
			<header class="mb-2">
				<h1 class="h4 mb-1">Talk with Wikipedia</h1>
				<p class="text-secondary small mb-0">Chrome Prompt API + Wikipedia RAG demo</p>
			</header>

			<div id="banner" class="alert alert-warning small mb-2" role="alert" hidden></div>

			<main
				id="messages"
				class="flex-grow-1 overflow-auto d-flex flex-column gap-2 py-3"
				aria-live="polite"
			></main>

			<form id="form" class="d-flex gap-2 pb-3 pt-2 bg-body sticky-bottom">
				<input
					id="input"
					class="form-control"
					type="text"
					placeholder="Ask a question about anything on Wikipedia…"
					autocomplete="off"
					required
				/>
				<button id="submit" class="btn btn-primary" type="submit">Ask</button>
			</form>
		</div>

	</body>
</html>
