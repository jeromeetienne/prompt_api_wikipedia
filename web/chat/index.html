<!doctype html>
<html lang="en">

<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Chat with Wikipedia</title>
	<script>
		(function () {
			var mq = window.matchMedia('(prefers-color-scheme: dark)');
			var apply = function () {
				document.documentElement.setAttribute('data-bs-theme', mq.matches ? 'dark' : 'light');
			};
			apply();
			mq.addEventListener('change', apply);
		})();
	</script>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
		integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
	<style>
		.markdown-bubble > :first-child { margin-top: 0; }
		.markdown-bubble > :last-child { margin-bottom: 0; }
		.markdown-bubble pre { margin-bottom: 0.5rem; padding: 0.5rem; background-color: var(--bs-body-bg); border-radius: 0.375rem; overflow-x: auto; }
		.markdown-bubble code { font-size: 0.875em; }
		.markdown-bubble :not(pre) > code { padding: 0.125rem 0.25rem; background-color: var(--bs-body-bg); border-radius: 0.25rem; }
	</style>
</head>

<body class="d-flex flex-column vh-100 bg-body">
	<nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom">
		<div class="container" style="max-width: 780px;">
			<div>
				<a class="navbar-brand fw-semibold mb-0 fs-5" href="/">Chat with Wikipedia</a>
			</div>
		</div>
	</nav>

	<div class="container d-flex flex-column flex-grow-1 overflow-hidden" style="max-width: 780px;">
		<div id="banner" class="alert alert-warning small mt-3 mb-0" role="alert" hidden></div>

		<main id="messages" class="flex-grow-1 overflow-auto d-flex flex-column gap-3 py-3" aria-live="polite"></main>

		<form id="form" class="pt-2 pb-3 bg-body sticky-bottom">
			<div class="input-group input-group-lg shadow-sm">
				<input id="input" class="form-control" type="text"
					placeholder="Ask a question about anything on Wikipedia…" autocomplete="off" required />
				<button id="submit" class="btn btn-primary" type="submit">Ask</button>
			</div>
		</form>
	</div>

	<script type="module" src="./src/main.ts"></script>
</body>

</html>
